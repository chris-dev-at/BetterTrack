<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" role="img"
     aria-label="BetterTrack Conglomerate builder: weighted basket with allocation donut">
  <rect width="600" height="380" fill="#0d0d0d"/>
  <rect x="0" y="0" width="600" height="44" fill="#171717"/>
  <text x="24" y="28" font-family="Arial" font-weight="700" font-size="15" fill="#f5f5f5">Conglomerate Builder</text>
  <!-- donut -->
  <g transform="translate(150,196)">
    <circle r="86" fill="none" stroke="#0284c7" stroke-width="30"
            stroke-dasharray="270 540" transform="rotate(-90)"/>
    <circle r="86" fill="none" stroke="#38bdf8" stroke-width="30"
            stroke-dasharray="135 540" stroke-dashoffset="-270" transform="rotate(-90)"/>
    <circle r="86" fill="none" stroke="#f6b82e" stroke-width="30"
            stroke-dasharray="81 540" stroke-dashoffset="-405" transform="rotate(-90)"/>
    <circle r="86" fill="none" stroke="#34d399" stroke-width="30"
            stroke-dasharray="54 540" stroke-dashoffset="-486" transform="rotate(-90)"/>
    <text y="-4" font-family="Arial" font-size="13" fill="#a3a3a3" text-anchor="middle">Weights</text>
    <text y="20" font-family="Arial" font-size="22" font-weight="700" fill="#f5f5f5" text-anchor="middle">100%</text>
  </g>
  <!-- weight rows -->
  <g font-family="Arial" font-size="13">
    <g transform="translate(300,86)">
      <rect width="276" height="46" rx="9" fill="#171717" stroke="#2e2e2e"/>
      <circle cx="24" cy="23" r="7" fill="#0284c7"/>
      <text x="42" y="28" fill="#f5f5f5">VWCE</text>
      <text x="256" y="28" fill="#f5f5f5" text-anchor="end" font-weight="700">50%</text>
    </g>
    <g transform="translate(300,140)">
      <rect width="276" height="46" rx="9" fill="#171717" stroke="#2e2e2e"/>
      <circle cx="24" cy="23" r="7" fill="#38bdf8"/>
      <text x="42" y="28" fill="#f5f5f5">Nasdaq 100</text>
      <text x="256" y="28" fill="#f5f5f5" text-anchor="end" font-weight="700">25%</text>
    </g>
    <g transform="translate(300,194)">
      <rect width="276" height="46" rx="9" fill="#171717" stroke="#2e2e2e"/>
      <circle cx="24" cy="23" r="7" fill="#f6b82e"/>
      <text x="42" y="28" fill="#f5f5f5">Gold</text>
      <text x="256" y="28" fill="#f5f5f5" text-anchor="end" font-weight="700">15%</text>
    </g>
    <g transform="translate(300,248)">
      <rect width="276" height="46" rx="9" fill="#171717" stroke="#2e2e2e"/>
      <circle cx="24" cy="23" r="7" fill="#34d399"/>
      <text x="42" y="28" fill="#f5f5f5">Bonds</text>
      <text x="256" y="28" fill="#f5f5f5" text-anchor="end" font-weight="700">10%</text>
    </g>
  </g>
  <rect x="24" y="316" width="552" height="44" rx="10" fill="#0284c7"/>
  <text x="300" y="343" font-family="Arial" font-size="14" font-weight="700" fill="#e0f2fe" text-anchor="middle">Rebalance &amp; save basket</text>
</svg>
