<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img"
     aria-label="BetterTrack portfolio overview: net worth, value chart and holdings">
  <defs>
    <linearGradient id="pf-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" fill="#0d0d0d"/>
  <!-- top bar -->
  <rect x="0" y="0" width="960" height="56" fill="#171717"/>
  <text x="28" y="35" font-family="Arial" font-weight="700" font-size="20">
    <tspan fill="#ffffff">Better</tspan><tspan fill="#f6b82e">Track</tspan>
  </text>
  <rect x="640" y="16" width="120" height="24" rx="12" fill="#262626"/>
  <text x="700" y="33" font-family="Arial" font-size="12" fill="#a3a3a3" text-anchor="middle">Growth ▾</text>
  <circle cx="800" cy="28" r="14" fill="#262626"/>
  <circle cx="840" cy="28" r="14" fill="#0284c7"/>
  <!-- stat cards -->
  <g font-family="Arial">
    <rect x="28" y="84" width="290" height="96" rx="12" fill="#171717" stroke="#2e2e2e"/>
    <text x="48" y="112" font-size="12" fill="#a3a3a3">Net Worth</text>
    <text x="48" y="150" font-size="30" font-weight="700" fill="#f5f5f5">€128,430</text>
    <text x="215" y="150" font-size="14" fill="#34d399">▲ 12.4%</text>

    <rect x="335" y="84" width="290" height="96" rx="12" fill="#171717" stroke="#2e2e2e"/>
    <text x="355" y="112" font-size="12" fill="#a3a3a3">Invested</text>
    <text x="355" y="150" font-size="30" font-weight="700" fill="#f5f5f5">€114,200</text>

    <rect x="642" y="84" width="290" height="96" rx="12" fill="#171717" stroke="#2e2e2e"/>
    <text x="662" y="112" font-size="12" fill="#a3a3a3">Liquidity</text>
    <text x="662" y="150" font-size="30" font-weight="700" fill="#f5f5f5">€14,230</text>
  </g>
  <!-- value chart -->
  <rect x="28" y="196" width="904" height="220" rx="12" fill="#171717" stroke="#2e2e2e"/>
  <path d="M60 372 L150 350 L240 356 L330 312 L420 320 L510 268 L600 284 L690 232 L780 246 L870 214"
        fill="none" stroke="#38bdf8" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M60 372 L150 350 L240 356 L330 312 L420 320 L510 268 L600 284 L690 232 L780 246 L870 214 L870 400 L60 400 Z"
        fill="url(#pf-area)"/>
  <g font-family="Arial" font-size="11" fill="#737373">
    <text x="60" y="418">Jan</text><text x="250" y="418">Apr</text>
    <text x="440" y="418">Jul</text><text x="630" y="418">Oct</text><text x="835" y="418">Now</text>
  </g>
  <!-- holdings rows -->
  <g font-family="Arial">
    <rect x="28" y="432" width="904" height="104" rx="12" fill="#171717" stroke="#2e2e2e"/>
    <g transform="translate(0,0)">
      <circle cx="56" cy="466" r="12" fill="#0284c7"/>
      <text x="80" y="463" font-size="14" fill="#f5f5f5">VWCE</text>
      <text x="80" y="480" font-size="11" fill="#737373">Vanguard FTSE All-World</text>
      <text x="760" y="472" font-size="15" fill="#f5f5f5" text-anchor="end">€62,140</text>
      <text x="904" y="472" font-size="13" fill="#34d399" text-anchor="end">+9.2%</text>
    </g>
    <line x1="44" y1="500" x2="916" y2="500" stroke="#2e2e2e"/>
    <g transform="translate(0,34)">
      <circle cx="56" cy="466" r="12" fill="#f6b82e"/>
      <text x="80" y="463" font-size="14" fill="#f5f5f5">Apartment · Vienna</text>
      <text x="80" y="480" font-size="11" fill="#737373">Custom asset · Real estate</text>
      <text x="760" y="472" font-size="15" fill="#f5f5f5" text-anchor="end">€48,000</text>
      <text x="904" y="472" font-size="13" fill="#34d399" text-anchor="end">+3.1%</text>
    </g>
  </g>
</svg>
