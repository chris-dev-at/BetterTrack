<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" role="img"
     aria-label="BetterTrack backtest: growth of a basket versus a benchmark">
  <rect width="600" height="380" fill="#0d0d0d"/>
  <rect x="0" y="0" width="600" height="44" fill="#171717"/>
  <text x="24" y="28" font-family="Arial" font-weight="700" font-size="15" fill="#f5f5f5">Backtest</text>
  <g font-family="Arial" font-size="11">
    <rect x="430" y="14" width="46" height="20" rx="6" fill="#0284c7"/>
    <text x="453" y="28" fill="#e0f2fe" text-anchor="middle">10Y</text>
    <rect x="484" y="14" width="46" height="20" rx="6" fill="#262626"/>
    <text x="507" y="28" fill="#a3a3a3" text-anchor="middle">Max</text>
  </g>
  <rect x="24" y="64" width="552" height="230" rx="10" fill="#171717" stroke="#2e2e2e"/>
  <!-- benchmark -->
  <path d="M52 258 L120 250 L188 238 L256 226 L324 214 L392 196 L460 188 L528 176"
        fill="none" stroke="#737373" stroke-width="2.5" stroke-dasharray="5 5" stroke-linecap="round"/>
  <!-- basket -->
  <path d="M52 258 L120 236 L188 244 L256 200 L324 176 L392 150 L460 118 L528 92"
        fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Arial" font-size="11" fill="#737373">
    <text x="52" y="284">2016</text><text x="250" y="284">2019</text>
    <text x="448" y="284">2022</text><text x="516" y="284">2026</text>
  </g>
  <!-- legend + stats -->
  <g font-family="Arial">
    <rect x="24" y="308" width="266" height="56" rx="10" fill="#171717" stroke="#2e2e2e"/>
    <rect x="40" y="326" width="14" height="4" rx="2" fill="#38bdf8"/>
    <text x="62" y="331" font-size="12" fill="#f5f5f5">My Conglomerate</text>
    <text x="62" y="351" font-size="16" font-weight="700" fill="#34d399">CAGR 11.8%</text>

    <rect x="310" y="308" width="266" height="56" rx="10" fill="#171717" stroke="#2e2e2e"/>
    <rect x="326" y="326" width="14" height="4" rx="2" fill="#737373"/>
    <text x="348" y="331" font-size="12" fill="#f5f5f5">S&amp;P 500</text>
    <text x="348" y="351" font-size="16" font-weight="700" fill="#a3a3a3">CAGR 9.1%</text>
  </g>
</svg>
