name: E2E (nightly)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright happy path
    runs-on: ubuntu-latest
    # Headroom for the V3 flow specs added in #426 (cash transfer, share-to-one-
    # friend, second watchlist, chat, alert fire) — the alert flow alone waits
    # out the ~60s worker evaluator tick, and every spec runs on both the desktop
    # and mobile-viewport projects.
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bettertrack_e2e
          POSTGRES_USER: bt
          POSTGRES_PASSWORD: bt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bt -d bettertrack_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_DATABASE_URL: postgres://bt:bt@localhost:5432/bettertrack_e2e
      E2E_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e happy path
        run: pnpm test:e2e

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
