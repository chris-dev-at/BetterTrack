name: CI

# No push:main trigger on purpose: the "require branches up to date" ruleset
# re-runs this exact suite on the PR right before merge, so the merge commit's
# tree is always the tree that was just tested — a post-merge run on main would
# be a byte-identical third pass. Nightly e2e still exercises main directly.
on:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Full history so the migrations-immutable gate can diff the PR's drizzle
        # journal against origin/main (#606). Shallow checkout would silently
        # no-op that check.
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Factory protocol tests (offline)
        run: ./multi-factory/test.sh

      - name: OpenAPI coverage gate
        run: pnpm --filter @bettertrack/api check:openapi-coverage

      - name: Migrations immutable gate
        # Freeze released migrations (#606): a deployed DB re-runs any journal
        # entry whose `when` moves above its high-water mark, so an existing
        # entry's when/tag/.sql must never change — only appends are allowed.
        run: |
          git fetch origin main --quiet
          pnpm --filter @bettertrack/api check:migrations-immutable

      - name: Build
        run: pnpm build

  integration:
    name: Integration tests (real Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bettertrack_test
          POSTGRES_USER: bt
          POSTGRES_PASSWORD: bt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bt -d bettertrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://bt:bt@localhost:5432/bettertrack_test
      TEST_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations against real Postgres
        run: pnpm --filter @bettertrack/api db:migrate
        env:
          DATABASE_URL: postgres://bt:bt@localhost:5432/bettertrack_test

      - name: Run integration test slice (real Postgres + Redis)
        run: pnpm --filter @bettertrack/api test:integration
