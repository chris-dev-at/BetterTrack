name: bettertrack

# Mode-conditional port overlay for BT_MODE=subdomains (§4.6, §11) — layer this
# on top of the base file:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.subdomains.yml up -d
#
# Only the front proxy port is published; the TLS-terminating reverse proxy
# (Caddy/Traefik/Cloudflare Tunnel) is what end users reach — api/web/admin are
# addressed by the proxy over the internal network, not by host port.

services:
  web:
    ports:
      - '${BT_HTTP_PORT:-80}:80'
