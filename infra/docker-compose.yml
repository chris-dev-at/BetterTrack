name: bettertrack

# Production Docker Compose topology — PROJECTPLAN.md §4.6.
# All images are built from the repo root (context: ..).
# Copy infra/.env.production.example → infra/.env and fill in values before running.
#
# First-run flow:
#   docker compose build
#   docker compose run --rm api node dist/scripts/migrate.js
#   docker compose run --rm api node dist/scripts/seed.js
#   docker compose up -d

services:
  # Front proxy: serves the user + admin SPAs and reverse-proxies the api origin.
  # One image, both topologies — BT_MODE selects the nginx layout at start (§4.6).
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      # Deploy marker baked into the SPA at build time (admin-login footer). The
      # live updater (infra/live/updater.sh) exports GIT_SHA/GIT_BUILD_TIME.
      args:
        GIT_SHA: '${GIT_SHA:-unknown}'
        GIT_BUILD_TIME: '${GIT_BUILD_TIME:-unknown}'
    restart: unless-stopped
    environment:
      # Topology (§11) — the same scheme the api derives its origins from.
      BT_MODE: '${BT_MODE:-subdomains}'
      BT_DOMAIN: '${BT_DOMAIN:-localhost}'
      BT_TLS: '${BT_TLS:-}'
      BT_SUB_API: '${BT_SUB_API:-api}'
      BT_SUB_WEB: '${BT_SUB_WEB:-web}'
      BT_SUB_ADMIN: '${BT_SUB_ADMIN:-admin}'
      BT_SUB_MOBILE: '${BT_SUB_MOBILE:-mobile}'
      BT_PORT_API: '${BT_PORT_API:-3000}'
      BT_PORT_WEB: '${BT_PORT_WEB:-8080}'
      BT_PORT_ADMIN: '${BT_PORT_ADMIN:-8081}'
      BT_PORT_PRODUCT: '${BT_PORT_PRODUCT:-8082}'
      BT_PORT_MOBILE: '${BT_PORT_MOBILE:-8083}'
      BT_API_ORIGIN: '${BT_API_ORIGIN:-}'
      API_UPSTREAM: 'api:3000'
      # The apex product + mobile origins proxy to the static `landing` container.
      LANDING_UPSTREAM: 'landing:80'
    # Host port bindings are mode-conditional and live in the override file for
    # your topology, NOT here (a bare `docker compose up` with only this file
    # publishes no host ports at all). Layer one of:
    #   -f infra/docker-compose.yml -f infra/docker-compose.subdomains.yml
    #   -f infra/docker-compose.yml -f infra/docker-compose.ports.yml
    # See README.md "Production deploy" worked examples.
    depends_on:
      api:
        condition: service_healthy
      # nginx resolves the landing upstream hostname at startup, so it must exist.
      landing:
        condition: service_started

  # Product landing page (bettertrack.at apex origin) + mobile.* placeholder —
  # a tiny framework-free static site (§13.3 V3-P12 arcs a+b). Independent of the
  # SPA and API; the only env it reads is the web-app origin its CTA links point
  # at. In both modes the `web` front proxy routes the apex + mobile origins to
  # this container over the internal network (arc (c) — no host ports of its own).
  landing:
    build:
      context: ..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    environment:
      # Web-app origin the "Open the web app" links resolve to. Defaults to the
      # subdomains-mode public web origin; override to match your topology mode.
      BT_WEB_ORIGIN: '${BT_WEB_ORIGIN:-https://web.${BT_DOMAIN:-bettertrack.at}}'

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      # Deploy marker baked into the runtime env (GET /api/v1/version). The live
      # updater (infra/live/updater.sh) exports GIT_SHA/GIT_BUILD_TIME.
      args:
        GIT_SHA: '${GIT_SHA:-unknown}'
        GIT_BUILD_TIME: '${GIT_BUILD_TIME:-unknown}'
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: '${DATABASE_URL}'
      REDIS_URL: '${REDIS_URL}'
      SESSION_SECRET: '${SESSION_SECRET}'
      # Topology (§11): the api derives api/web/admin origins → CORS + cookies.
      BT_MODE: '${BT_MODE:-subdomains}'
      BT_DOMAIN: '${BT_DOMAIN:-localhost}'
      BT_TLS: '${BT_TLS:-}'
      BT_SUB_API: '${BT_SUB_API:-api}'
      BT_SUB_WEB: '${BT_SUB_WEB:-web}'
      BT_SUB_ADMIN: '${BT_SUB_ADMIN:-admin}'
      BT_SUB_MOBILE: '${BT_SUB_MOBILE:-mobile}'
      BT_PORT_API: '${BT_PORT_API:-3000}'
      BT_PORT_WEB: '${BT_PORT_WEB:-8080}'
      BT_PORT_ADMIN: '${BT_PORT_ADMIN:-8081}'
      BT_PORT_PRODUCT: '${BT_PORT_PRODUCT:-8082}'
      BT_PORT_MOBILE: '${BT_PORT_MOBILE:-8083}'
      BT_API_ORIGIN: '${BT_API_ORIGIN:-}'
      BT_WEB_ORIGIN: '${BT_WEB_ORIGIN:-}'
      BT_ADMIN_ORIGIN: '${BT_ADMIN_ORIGIN:-}'
      BT_PRODUCT_ORIGIN: '${BT_PRODUCT_ORIGIN:-}'
      BT_MOBILE_ORIGIN: '${BT_MOBILE_ORIGIN:-}'
      SMTP_HOST: '${SMTP_HOST:-}'
      SMTP_PORT: '${SMTP_PORT:-}'
      SMTP_USER: '${SMTP_USER:-}'
      SMTP_PASS: '${SMTP_PASS:-}'
      SMTP_FROM: '${SMTP_FROM:-}'
      ADMIN_EMAIL: '${ADMIN_EMAIL:-}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:-}'
      RATE_LIMIT_BURST_WINDOW_SEC: '${RATE_LIMIT_BURST_WINDOW_SEC:-10}'
      RATE_LIMIT_BURST_LIMIT: '${RATE_LIMIT_BURST_LIMIT:-60}'
      # Push channels (#368) — both optional, SMTP-style gating: unset ⇒ the
      # channel is disabled with one boot warn, nothing crashes. The FCM path
      # points at a MOUNTED service-account JSON (compose.override.yml adds the
      # volume; see the #421 go-live runbook) — the key never enters an image.
      BT_FCM_SERVICE_ACCOUNT_FILE: '${BT_FCM_SERVICE_ACCOUNT_FILE:-}'
      BT_VAPID_PUBLIC_KEY: '${BT_VAPID_PUBLIC_KEY:-}'
      BT_VAPID_PRIVATE_KEY: '${BT_VAPID_PRIVATE_KEY:-}'
      BT_VAPID_SUBJECT: '${BT_VAPID_SUBJECT:-}'
      # Prometheus metrics listener (#564, §13.5 V5-P2). Bound to 0.0.0.0
      # INSIDE the container so the `prometheus` sidecar can scrape it over the
      # internal docker network — this port is NEVER published to a host port,
      # so it stays unreachable from any public origin (the localhost/LAN-only
      # mandate, §16 2026-07-17). Set BT_METRICS_ENABLED=false to bind no port.
      BT_METRICS_ENABLED: '${BT_METRICS_ENABLED:-true}'
      BT_METRICS_HOST: '${BT_METRICS_HOST:-0.0.0.0}'
      BT_METRICS_PORT: '${BT_METRICS_PORT:-9464}'
      # Admin monitoring / Diagnostics + external access (§13.5 V5-P2 arc (a),
      # owner 2026-07-19). The api reaches Grafana/Prometheus over the internal
      # network for the reachability probe + the admin-proxied Grafana reverse
      # proxy. External access is OFF by default (localhost/LAN-only); the api
      # reads BT_GRAFANA_ADMIN_PASSWORD ONLY to gate exposure — it never logs it
      # or sends it to a client, and never puts admin/admin on a public door.
      BT_OBS_EXTERNAL_ACCESS: '${BT_OBS_EXTERNAL_ACCESS:-}'
      BT_GRAFANA_ADMIN_PASSWORD: '${BT_GRAFANA_ADMIN_PASSWORD:-}'
      BT_GRAFANA_INTERNAL_URL: '${BT_GRAFANA_INTERNAL_URL:-http://grafana:3000}'
      BT_PROMETHEUS_INTERNAL_URL: '${BT_PROMETHEUS_INTERNAL_URL:-http://prometheus:9090}'
      BT_GRAFANA_PUBLIC_URL: '${BT_GRAFANA_PUBLIC_URL:-}'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Worker (BullMQ processors) — same image as api, entry dist/scripts/worker.js
  # (tsup entry src/scripts/worker.ts → start:worker). Runs the scheduled +
  # event-driven jobs (§9): prices.refreshDaily, prices.backfill, fx.refreshSpot,
  # catalog.enrich, notifications.dispatch. No HTTP surface, so no host ports.
  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ['node', 'dist/scripts/worker.js']
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: '${DATABASE_URL}'
      REDIS_URL: '${REDIS_URL}'
      SESSION_SECRET: '${SESSION_SECRET}'
      # Topology (§11): the worker generates the same origins/links as the api
      # (share links, email URLs) so they must match.
      BT_MODE: '${BT_MODE:-subdomains}'
      BT_DOMAIN: '${BT_DOMAIN:-localhost}'
      BT_TLS: '${BT_TLS:-}'
      BT_SUB_API: '${BT_SUB_API:-api}'
      BT_SUB_WEB: '${BT_SUB_WEB:-web}'
      BT_SUB_ADMIN: '${BT_SUB_ADMIN:-admin}'
      BT_SUB_MOBILE: '${BT_SUB_MOBILE:-mobile}'
      BT_PORT_API: '${BT_PORT_API:-3000}'
      BT_PORT_WEB: '${BT_PORT_WEB:-8080}'
      BT_PORT_ADMIN: '${BT_PORT_ADMIN:-8081}'
      BT_PORT_PRODUCT: '${BT_PORT_PRODUCT:-8082}'
      BT_PORT_MOBILE: '${BT_PORT_MOBILE:-8083}'
      BT_API_ORIGIN: '${BT_API_ORIGIN:-}'
      BT_WEB_ORIGIN: '${BT_WEB_ORIGIN:-}'
      BT_ADMIN_ORIGIN: '${BT_ADMIN_ORIGIN:-}'
      BT_PRODUCT_ORIGIN: '${BT_PRODUCT_ORIGIN:-}'
      BT_MOBILE_ORIGIN: '${BT_MOBILE_ORIGIN:-}'
      SMTP_HOST: '${SMTP_HOST:-}'
      SMTP_PORT: '${SMTP_PORT:-}'
      SMTP_USER: '${SMTP_USER:-}'
      SMTP_PASS: '${SMTP_PASS:-}'
      SMTP_FROM: '${SMTP_FROM:-}'
      ADMIN_EMAIL: '${ADMIN_EMAIL:-}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:-}'
      RATE_LIMIT_BURST_WINDOW_SEC: '${RATE_LIMIT_BURST_WINDOW_SEC:-10}'
      RATE_LIMIT_BURST_LIMIT: '${RATE_LIMIT_BURST_LIMIT:-60}'
      # Push channels (#368) — both optional, SMTP-style gating: unset ⇒ the
      # channel is disabled with one boot warn, nothing crashes. The FCM path
      # points at a MOUNTED service-account JSON (compose.override.yml adds the
      # volume; see the #421 go-live runbook) — the key never enters an image.
      BT_FCM_SERVICE_ACCOUNT_FILE: '${BT_FCM_SERVICE_ACCOUNT_FILE:-}'
      BT_VAPID_PUBLIC_KEY: '${BT_VAPID_PUBLIC_KEY:-}'
      BT_VAPID_PRIVATE_KEY: '${BT_VAPID_PRIVATE_KEY:-}'
      BT_VAPID_SUBJECT: '${BT_VAPID_SUBJECT:-}'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: '${POSTGRES_USER:-bt}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB:-bettertrack}'
      # Nightly backup rotation window (§10) — consumed by backup.sh, triggered
      # via host cron (see README.md "Backups & restore"), not a 6th service.
      BACKUP_RETENTION_DAYS: '${BACKUP_RETENTION_DAYS:-14}'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups
      - ./backup/backup.sh:/opt/bettertrack/backup.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bt} -d ${POSTGRES_DB:-bettertrack}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability (§13.5 V5-P2 arc (a), §16 2026-07-17) ─────────────────────
  # Self-provisioned monitoring: Prometheus scrapes the API metrics listener
  # over the internal network; Grafana auto-wires the datasource + starter
  # dashboard on first boot (zero owner setup). Their host ports bind to
  # ${BT_OBS_BIND_HOST} (default 127.0.0.1 = localhost only; set a LAN IP for
  # LAN access) and are DELIBERATELY not routed through the public web/nginx
  # front proxy — these surfaces are never reachable from a public origin. The
  # admin panel is the only public management surface.
  prometheus:
    image: prom/prometheus:v2.53.3
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      # localhost/LAN only — never the public origin.
      - '${BT_OBS_BIND_HOST:-127.0.0.1}:${BT_PROMETHEUS_PORT:-9090}:9090'
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.3.1
    restart: unless-stopped
    environment:
      # Local-admin bootstrap. Change the default before first boot; the owner
      # only ever reaches this over localhost/LAN, and sign-up is disabled.
      GF_SECURITY_ADMIN_USER: '${BT_GRAFANA_ADMIN_USER:-admin}'
      GF_SECURITY_ADMIN_PASSWORD: '${BT_GRAFANA_ADMIN_PASSWORD:-admin}'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_HTTP_PORT: '3000'
      # ── External access via the admin app (§13.5 V5-P2 arc (a), owner 2026-07-19) ─
      # The owner asked to reach Grafana from OUTSIDE the LAN too, but only
      # through an authenticated path. The PRIMARY path proxies through the admin
      # API (`/api/v1/admin/monitoring/grafana`, behind admin auth). For that
      # frame + sub-path to render, Grafana must allow embedding and serve from
      # the proxy sub-path. Defaults keep the localhost/LAN path unchanged; the
      # live dev sets the two SERVE_FROM_SUB_PATH/ROOT_URL vars to activate the
      # admin-proxy path (see docs/monitoring.md). Prometheus is never proxied.
      GF_SECURITY_ALLOW_EMBEDDING: '${BT_GRAFANA_ALLOW_EMBEDDING:-true}'
      GF_SERVER_ROOT_URL: '${BT_GRAFANA_ROOT_URL:-http://localhost:3000/}'
      GF_SERVER_SERVE_FROM_SUB_PATH: '${BT_GRAFANA_SERVE_FROM_SUB_PATH:-false}'
      # Anonymous read-only access: OFF by default (the localhost/LAN + auth-gated
      # subdomain paths use Grafana's own login). The admin-proxy path sets this
      # ON — the proxy already enforces admin auth, so an anonymous Viewer behind
      # it renders dashboards without a second login. Safe because Grafana's port
      # is localhost/LAN-only; external reach is admin-gated by the proxy.
      GF_AUTH_ANONYMOUS_ENABLED: '${BT_GRAFANA_ANON_ENABLED:-false}'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Viewer'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      # localhost/LAN only — never the public origin.
      - '${BT_OBS_BIND_HOST:-127.0.0.1}:${BT_GRAFANA_PORT:-3001}:3000'
    depends_on:
      prometheus:
        condition: service_started

  # ── Infra exporters (§13.5 V5-P2 arc (a), owner 2026-07-19) ─────────────────
  # Give the dashboards real infra health beyond the app's own /metrics.
  # DELIBERATELY publish NO host ports: Prometheus scrapes them by service name
  # over the internal docker network, so they are unreachable from any host
  # origin — stricter than even the localhost/LAN Prometheus/Grafana binds.

  # Host CPU / memory / disk / network.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host

  # Per-container CPU / memory / IO.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  # DB connections, slow queries, table sizes.
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: 'postgresql://${POSTGRES_USER:-bt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bettertrack}?sslmode=disable'
    depends_on:
      db:
        condition: service_healthy

  # Cache hit rate, memory, evictions.
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: 'redis://redis:6379'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  pgbackups:
  promdata:
  grafanadata:
