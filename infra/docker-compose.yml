name: bettertrack

# Production Docker Compose topology — PROJECTPLAN.md §4.6.
# All images are built from the repo root (context: ..).
# Copy infra/.env.production.example → infra/.env and fill in values before running.
#
# First-run flow:
#   docker compose build
#   docker compose run --rm api node dist/scripts/migrate.js
#   docker compose run --rm api node dist/scripts/seed.js
#   docker compose up -d

services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-80}:80'
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: '${DATABASE_URL}'
      REDIS_URL: '${REDIS_URL}'
      SESSION_SECRET: '${SESSION_SECRET}'
      APP_ORIGIN: '${APP_ORIGIN}'
      SMTP_HOST: '${SMTP_HOST:-}'
      SMTP_PORT: '${SMTP_PORT:-}'
      SMTP_USER: '${SMTP_USER:-}'
      SMTP_PASS: '${SMTP_PASS:-}'
      SMTP_FROM: '${SMTP_FROM:-}'
      ADMIN_EMAIL: '${ADMIN_EMAIL:-}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:-}'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Worker (BullMQ processors) — placeholder for Phase 1+.
  # Uncomment when apps/api/src/worker.ts exists and add it to tsup entry.
  #
  # worker:
  #   build:
  #     context: ..
  #     dockerfile: apps/api/Dockerfile
  #   command: ["node", "dist/worker.js"]
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: "${DATABASE_URL}"
  #     REDIS_URL: "${REDIS_URL}"
  #     SESSION_SECRET: "${SESSION_SECRET}"
  #     APP_ORIGIN: "${APP_ORIGIN}"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: '${POSTGRES_USER:-bt}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB:-bettertrack}'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bt} -d ${POSTGRES_DB:-bettertrack}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  pgbackups:
