server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Immutable cache for content-hashed Vite assets (JS, CSS, fonts, images).
    # Vite names these files with a content hash, so max-age + immutable is safe.
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Proxy /api (and /ws for future WebSocket gateway) to the API service.
    # Same-origin: no CORS headers needed; session cookies just work.
    location /api {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback: unknown paths serve index.html so React Router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
