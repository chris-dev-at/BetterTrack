# BetterTrack go-live edge additions — CANONICAL, version-controlled copy.
#
# The file that actually runs lives OUTSIDE this repo, in the live control dir on
# the prod host (mounted into the `web` nginx container's conf.d). This is the
# source of truth the deployment ADOPTS — since the #460 follow-up automatically:
# on every successful deploy tick the live updater validates a changed copy with
# `nginx -t` and swaps + reloads it only on pass (see infra/live/README.md).
# Because of that, NOTHING machine-local may live in this file — host-specific
# targets go into control-dir-only includes (see the legacy block below).
#
# Loaded alongside the repo template render (conf.d/default.conf). nginx keeps
# the FIRST server block when a listen+server_name pair is duplicated, and this
# file sorts before default.conf — so the api block below SHADOWS the template's
# api block (adding Cloudflare real-IP recovery + proto pass-through). The
# template's web./admin. blocks stay in charge (static SPA serving — nothing to
# fix there). The "conflicting server name" warning in the nginx log is
# expected and benign.
#
# WebSocket note (#396): because THIS api block is the active one in live, the
# WebSocket upgrade forwarding must live here too, not only in the template. The
# template (default.conf) declares `map $http_upgrade $connection_upgrade`; this
# file loads alongside it, and nginx FAILS TO BOOT on a duplicate map. So this
# file declares its OWN uniquely-named map variable, $bt_connection_upgrade —
# two independent maps over the same $http_upgrade input, zero collision — and
# the api block below uses it. (The template's $connection_upgrade stays valid
# for its own shadowed block; an unused map variable is harmless.)
#
# Replaced by the real thing when PROJECTPLAN §13.3 V3-P12 ships the 5-origin
# production topology in-repo.

# ── Real client IPs ──────────────────────────────────────────────────────────
# Docker Desktop on macOS NATs every inbound connection through its gateway, so
# $remote_addr is always a private address and useless for rate limiting.
# Recover the visitor IP from Cloudflare's CF-Connecting-IP header for any
# private-range peer (all traffic arrives that way on this host).
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header CF-Connecting-IP;

# HTTPS terminates at Cloudflare; the origin hop is plain HTTP on port 80.
# Pass the edge protocol through to the API instead of stamping "http".
map $http_x_forwarded_proto $bt_proto {
    ''      $scheme;
    default $http_x_forwarded_proto;
}

# WebSocket upgrade forwarding (realtime gateway, /ws). Uniquely named
# ($bt_connection_upgrade) so it never collides with the template's
# $connection_upgrade map when both configs load in conf.d (see header note).
map $http_upgrade $bt_connection_upgrade {
    default upgrade;
    ''      close;
}

# Edge-secret gate (defense in depth): a Cloudflare transform rule stamps
# x-bt-edge on every proxied request; once enforced, requests that did not come
# through Cloudflare cannot reach the API even with a forged Host header.
# Enforcement is toggled in edge-secret.inc (gate is OFF until a secret is set).
include /etc/nginx/conf.d/edge-secret.inc;

# ── SEO fence (owner order 2026-07-07) ───────────────────────────────────────
# Only the product site (bettertrack.at + www) may be indexed. Every other
# origin — web., admin., api., mobile. — carries X-Robots-Tag: noindex.
# Declared at http level so the template's web./admin. server blocks inherit it
# for their SPA pages (their asset locations override add_header locally, which
# is fine — crawlers index pages, not bundles). An empty map value makes nginx
# omit the header entirely on the product origin.
map $host $bt_noindex {
    default              "noindex, nofollow";
    "bettertrack.at"     "";
    "www.bettertrack.at" "";
}
add_header X-Robots-Tag $bt_noindex always;

# ── API origin (shadows the template block) ──────────────────────────────────
server {
    listen 80;
    server_name api.bettertrack.at;

    if ($bt_edge_ok = 0) { return 444; }

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        # Forward the WebSocket upgrade (realtime gateway /ws); without these two
        # headers nginx strips the handshake and socket.io falls back to polling (#396).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $bt_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $bt_proto;
        # Long-lived sockets: engine.io pings every ~25s — keep the upstream read
        # open well past that so idle connections are not torn down mid-session.
        proxy_read_timeout 300s;
    }
}

# ── Product page (interim until V3-P12) ──────────────────────────────────────
# Serves the static product site from the control dir's edge/html/product
# mount. Directory pages need no explicit location — the generic try_files
# below resolves /<page>/ to <page>/index.html. That is how the legal set is
# served too (canonical copies in-repo at infra/live/edge/html/product/):
#   /terms/      + /terms/de/       Terms of Service (EN/DE)
#   /privacy/    + /privacy/de/     Privacy policy   (EN/DE)
#   /impressum/  + /impressum/de/   Impressum        (EN/DE)
#   /cookies/    + /cookies/de/     Cookie note      (EN/DE)
# Adding/updating those files on the live box requires NO nginx change or
# reload — copy them into the mounted html dir (see infra/live/README.md).
server {
    listen 80;
    server_name bettertrack.at www.bettertrack.at;

    root /usr/share/nginx/bt-live/product;
    index index.html;

    # TLS terminates at Cloudflare, so nginx believes the scheme is http and its
    # absolute directory redirects (/terms -> http://…/terms/) would bounce an
    # https visitor down to plain http. Relative redirects keep the visitor's
    # scheme untouched.
    absolute_redirect off;

    # Unknown paths must be a real 404, and HTML must always revalidate. The old
    # /index.html fallback answered every typo with the homepage as a cacheable
    # 200 — and with no Cache-Control, browsers heuristically cached that wrong
    # page for days (10% of Last-Modified age), so visitors kept seeing pages
    # that had long been fixed. no-cache still permits If-Modified-Since
    # revalidation, so repeat views remain cheap 304s. (The 404 page sits in its
    # own directory because the updater's html sync copies subdirectories only.)
    error_page 404 /404/index.html;

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ =404;
    }

    # Assets may cache briefly; style.css is versioned only by query string, so
    # keep the TTL short enough that a missed ?v= bump self-heals within an hour.
    location ~* \.(png|jpg|jpeg|gif|svg|ico|css|js|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=3600" always;
    }
}

# ── Mobile placeholder (interim until V3-P12) ────────────────────────────────
server {
    listen 80;
    server_name mobile.bettertrack.at;

    root /usr/share/nginx/bt-live/mobile;
    index index.html;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / { try_files $uri /index.html; }
}

# ── Reroute everything else to the legacy sites box (owner order 2026-07-09) ──
# Anything reaching this machine on port 80 that is NOT a bettertrack.at hostname
# (the owner's old websites, reached by their own domains) is proxied to the
# owner's legacy web server so those sites stay online.
#
# The proxy TARGET is machine-local and deliberately NOT in this file: the live
# updater adopts this conf verbatim on every deploy, so nothing host-specific may
# live here. Each live box provides
#     edge/legacy-upstream.inc  (mounted at /etc/nginx/conf.d/legacy-upstream.inc)
# holding a single `proxy_pass http://<target>;` line for however the legacy box
# is reachable from that host's containers (LAN address, host-side relay, …).
# If the include is missing, `nginx -t` fails and the updater keeps the previous
# conf — a box can't silently lose its legacy routing. (The `.inc` suffix keeps
# it out of nginx's conf.d *.conf auto-include, same as edge-secret.inc.)
#
# The legacy sites keep their own SEO — the http-level "X-Robots-Tag: noindex" is
# intentionally NOT stamped here (an add_header at this level breaks inheritance).
server {
    listen 80 default_server;
    server_name _;

    add_header X-Robots-Tag "" always;

    location / {
        include /etc/nginx/conf.d/legacy-upstream.inc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $bt_proto;
    }
}
