name: bettertrack-dev

# Dev dependencies only — Postgres + Redis. The apps (web/api/worker) run
# locally via `pnpm dev` against these (PROJECTPLAN.md §11).

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: bt
      POSTGRES_PASSWORD: bt
      POSTGRES_DB: bettertrack
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bt -d bettertrack']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
